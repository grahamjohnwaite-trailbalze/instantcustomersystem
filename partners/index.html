      { id:18, name:'EV Charger Finder', type:'Local Guide', freq:'Quarterly', cat:'Transport', desc:'Guide to public EV charging locations', val:'£500' },

    const HH = [

    const NN = [
      { brand:'Smart Money News', ed:'Manchester', niche:'Finance', sub:'Personal Finance', freq:'Weekly', status:'Active' },

      { brand:'Home Seller Insider', ed:'Peterborough', niche:'Property', sub:'Sellers', freq:'Weekly', status:'Active' },
      { brand:'Taste Trail', ed:'Peterborough', niche:'Food', sub:'Going Out', freq:'Weekly', status:'Active' },
      { brand:'Pet Insider', ed:'Cambridgeshire', niche:'Pets', sub:'Advice', freq:'Weekly', status:'Active' },
    ];

    const REGIONS = ['All','Cambridgeshire','Peterborough','Norfolk','Stamford','National'];
    const PRIORITIES = ['All','High','Medium','Low'];
    const CATS = ['All','Cafe','Pub','Restaurant','Market','Heritage','Theatre','Park','Venue','Retail'];

    const GUIDE_STEPS = [
      { num:1, icon:'📋', title:'Browse the Story Bank', desc:'Search and filter 700+ editorial signals by region, priority, and section. Hit + to add stories to your Issue Builder.' },
      { num:2, icon:'📍', title:'Check Venues & Activations', desc:'Browse Venues for sponsor-ready locations. Check Activations for monetisable content formats like Taste Trail, Expert Q&A, and seasonal guides.' },
      { num:3, icon:'🪝', title:'Pick Your Hooks', desc:'Go to Hooks to find headline templates. 360 proven formats — Questions, Numbers, Debates, Warnings — each with real examples.' },
      { num:4, icon:'📡', title:'Feed From Inoreader', desc:'Paste headlines or snippets from your Inoreader feeds. Assign a lifelane and they join the queue as candidate topics.' },
      { num:5, icon:'🧩', title:'Build Your Issue', desc:'Use the Issue Builder on the Dashboard. Selected stories appear here with suggested activations. This becomes your editorial plan.' },
      { num:6, icon:'📰', title:'Manage Niche Editions', desc:'Go to Niche Hub to see all newsletter brands, cross-pollination opportunities, and the expansion pipeline.' },
    ];

    const PriBadge = ({p}) => {
      const c = p==='High'?'bg-red-900 text-red-300':p==='Medium'?'bg-yellow-900 text-yellow-300':p==='Very High'?'bg-red-800 text-red-200':'bg-green-900 text-green-300';
      return <span className={"text-xs px-2 py-0.5 rounded-full font-medium " + c}>{p}</span>;
    };

    function SpotlightHQ() {
      const [tab, setTab] = useState('dashboard');
      const [q, setQ] = useState('');
      const [regF, setRegF] = useState('All');
      const [priF, setPriF] = useState('All');
      const [catF, setCatF] = useState('All');
      const [ino, setIno] = useState([]);
      const [inoInput, setInoInput] = useState('');
      const [inoLane, setInoLane] = useState('Money & Cost of Living');
      const [picked, setPicked] = useState([]);
      const [hookQ, setHookQ] = useState('');
      const [venQ, setVenQ] = useState('');
      const [actQ, setActQ] = useState('');
      const [showGuide, setShowGuide] = useState(() => {
        try { return localStorage.getItem('spotlightHQ_guideDismissed') !== 'true'; } catch(e) { return true; }
      });

      const dismissGuide = () => {
        setShowGuide(false);
        try { localStorage.setItem('spotlightHQ_guideDismissed', 'true'); } catch(e) {}
      };
      const reopenGuide = () => {
        setShowGuide(true);
        try { localStorage.removeItem('spotlightHQ_guideDismissed'); } catch(e) {}
      };

      const filteredStories = useMemo(() => {
        return SS.filter(s => {
          if (regF !== 'All' && s.reg !== regF) return false;
          if (priF !== 'All' && s.pri !== priF) return false;
          if (q) { const low = q.toLowerCase(); return (s.lead+s.hl+s.sec+s.loc+s.sig).toLowerCase().includes(low); }
          return true;
        });
      }, [q, regF, priF]);

      const filteredVenues = useMemo(() => {
        return VV.filter(v => {
          if (regF !== 'All' && v.reg !== regF) return false;
          if (catF !== 'All' && v.cat !== catF) return false;
          if (venQ) { const low = venQ.toLowerCase(); return (v.name+v.town+v.cat+v.desc).toLowerCase().includes(low); }
          return true;
        });
      }, [venQ, regF, catF]);

      const filteredActs = useMemo(() => {
        if (!actQ) return AA;
        const low = actQ.toLowerCase();
        return AA.filter(a => (a.name+a.cat+a.desc+a.type).toLowerCase().includes(low));
      }, [actQ]);

      const filteredHooks = useMemo(() => {
        if (!hookQ) return HH;
        const low = hookQ.toLowerCase();
        return HH.filter(h => (h.template+h.ex+h.type).toLowerCase().includes(low));
      }, [hookQ]);

      const addIno = () => {
        if (!inoInput.trim()) return;
        setIno(p => [...p, { id: Date.now(), text: inoInput.trim(), lane: inoLane, added: new Date().toLocaleDateString(), used: false }]);
        setInoInput('');
      };
      const removeIno = (id) => setIno(p => p.filter(i => i.id !== id));
      const togglePick = (id) => setPicked(p => p.includes(id) ? p.filter(x=>x!==id) : [...p, id]);

      const tabs = [
        { key:'dashboard', label:'Dashboard', icon:'📊' },
        { key:'stories', label:'Story Bank', icon:'🗃️' },
        { key:'venues', label:'Venues', icon:'📍' },
        { key:'activations', label:'Activations', icon:'⚡' },
        { key:'hooks', label:'Hooks', icon:'💡' },
        { key:'inoreader', label:'Inoreader', icon:'📡' },
        { key:'niche', label:'Niche Hub', icon:'📰' },
      ];

      return (
        <div className="min-h-screen bg-gray-950 text-gray-100">
          {/* Header */}
          <div className="border-b border-gray-800 bg-gray-900">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white text-sm">🌐</div>
                <div>
                  <h1 className="text-lg font-bold text-white">Spotlight HQ</h1>
                  <p className="text-xs text-gray-400">Integrated Editorial Intelligence</p>
                </div>
              </div>
              <div className="flex items-center gap-4 text-xs text-gray-400">
                <span>🗃️ {SS.length} signals</span>
                <span>📍 {VV.length} venues</span>
                <span>⚡ {AA.length} activations</span>
                <span>📡 {ino.length} feed items</span>
                {!showGuide && (
                  <button onClick={reopenGuide} className="text-amber-500 hover:text-amber-400 text-base" title="Show welcome guide">❓</button>
                )}
              </div>
            </div>
          </div>

          {/* Tab Bar */}
          <div className="border-b border-gray-800 bg-gray-900">
            <div className="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto">
              {tabs.map(t => (
                <button key={t.key} onClick={() => setTab(t.key)} className={"flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors whitespace-nowrap " + (tab===t.key ? 'border-amber-500 text-amber-400' : 'border-transparent text-gray-400 hover:text-gray-200')}>
                  <span>{t.icon}</span> {t.label}
                </button>
              ))}
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 py-6">

            {/* Welcome Guide */}
            {showGuide && (
              <div className="mb-6 bg-gray-900 border border-gray-700 rounded-xl p-6">
                <div className="flex items-start justify-between mb-4">
                  <div>
                    <h2 className="text-lg font-bold text-amber-400">👋 Welcome to Spotlight HQ</h2>
                    <p className="text-sm text-gray-400 mt-1">Here's how to use this system, step by step:</p>
                  </div>
                  <button onClick={dismissGuide} className="text-gray-500 hover:text-gray-300 text-xl leading-none">✕</button>
                </div>
                <div className="space-y-4">
                  {GUIDE_STEPS.map(step => (
                    <div key={step.num} className="flex items-start gap-4">
                      <div className="flex-shrink-0 w-8 h-8 rounded-full bg-amber-600 text-white text-sm font-bold flex items-center justify-center">{step.num}</div>
                      <div className="flex-1">
                        <h3 className="text-sm font-semibold text-white">{step.icon} {step.title}</h3>
                        <p className="text-xs text-gray-400 mt-0.5 leading-relaxed">{step.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="mt-5 pt-4 border-t border-gray-700">
                  <button onClick={dismissGuide} className="text-xs text-gray-500 hover:text-gray-300 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2">Got it — dismiss</button>
                </div>
              </div>
            )}

            {/* DASHBOARD */}
            {tab === 'dashboard' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { label:'High Priority Stories', val: SS.filter(s=>s.pri==='High').length, color:'text-red-400', icon:'🔴' },
                    { label:'Venues Ready', val: VV.length, color:'text-emerald-400', icon:'📍' },
                    { label:'Activations Available', val: AA.length, color:'text-blue-400', icon:'⚡' },
                    { label:'Inoreader Queue', val: ino.filter(i=>!i.used).length, color:'text-purple-400', icon:'📡' },
                  ].map((c,i) => (
                    <div key={i} className="bg-gray-900 border border-gray-800 rounded-xl p-4">
                      <div className="flex items-center gap-2 mb-2">
                        <span>{c.icon}</span>
                        <span className="text-xs text-gray-400">{c.label}</span>
                      </div>
                      <div className={"text-2xl font-bold " + c.color}>{c.val}</div>
                    </div>
                  ))}
                </div>

                <div className="grid md:grid-cols-2 gap-6">
                  <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                    <h3 className="text-sm font-semibold text-amber-400 mb-4">⭐ Smart Suggestions This Week</h3>
                    <div className="space-y-3">
                      {SS.filter(s=>s.pri==='High').slice(0,5).map(s => (
                        <div key={s.id} className="bg-gray-800 rounded-lg p-3 border border-gray-700">
                          <div className="flex items-start justify-between gap-2">
                            <div className="flex-1 min-w-0">
                              <p className="text-sm font-medium text-white truncate">{s.hl}</p>
                              <p className="text-xs text-gray-400 mt-1">{s.reg} · {s.sec}</p>
                            </div>
                            <button onClick={() => togglePick(s.id)} className={"flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-xs " + (picked.includes(s.id) ? 'bg-amber-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600')}>
                              {picked.includes(s.id) ? '✓' : '+'}
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                    <h3 className="text-sm font-semibold text-amber-400 mb-4">📄 Issue Builder ({picked.length} selected)</h3>
                    {picked.length === 0 ? (
                      <div className="text-center py-8 text-gray-500">
                        <p className="text-2xl mb-2">📋</p>
                        <p className="text-sm">Add stories from suggestions or the Story Bank</p>
                      </div>
                    ) : (
                      <div className="space-y-2">
                        {picked.map(id => {
                          const s = SS.find(x=>x.id===id);
                          if (!s) return null;
                          return (
                            <div key={id} className="flex items-center gap-2 bg-gray-800 rounded-lg p-2 border border-gray-700">
                              <div className="flex-1 min-w-0">
                                <p className="text-xs font-medium text-white truncate">{s.hl}</p>
                                <p className="text-xs text-gray-500">{s.sec}</p>
                              </div>
                              <button onClick={() => togglePick(id)} className="text-gray-500 hover:text-red-400 text-xs">✕</button>
                            </div>
                          );
                        })}
                      </div>
                    )}
                    <div className="mt-4 pt-4 border-t border-gray-700">
                      <h4 className="text-xs font-semibold text-gray-400 mb-2">Suggested Activations</h4>
                      <div className="flex flex-wrap gap-2">
                        {AA.slice(0,4).map(a => (
                          <span key={a.id} className="text-xs bg-gray-800 border border-gray-700 rounded-full px-3 py-1 text-gray-300">{a.name}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-amber-400 mb-4">📈 Coverage by Region</h3>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    {['Cambridgeshire','Peterborough','Norfolk','Stamford'].map(r => {
                      const ct = SS.filter(s=>s.reg===r).length;
                      const vc = VV.filter(v=>v.reg===r).length;
                      return (
                        <div key={r} className="bg-gray-800 rounded-lg p-3 border border-gray-700">
                          <p className="text-sm font-medium text-white">{r}</p>
                          <p className="text-xs text-gray-400 mt-1">{ct} stories · {vc} venues</p>
                          <div className="mt-2 h-1.5 bg-gray-700 rounded-full overflow-hidden">
                            <div className="h-full bg-amber-500 rounded-full" style={{width: Math.min(100, ct*3) + '%'}}></div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* STORIES */}
            {tab === 'stories' && (
              <div className="space-y-4">
                <div className="flex flex-col md:flex-row gap-3">
                  <div className="flex-1 relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔍</span>
                    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search stories, headlines, sections..." className="w-full pl-10 pr-4 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500" />
                  </div>
                  <select value={regF} onChange={e=>setRegF(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-amber-500">
                    {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                  <select value={priF} onChange={e=>setPriF(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-amber-500">
                    {PRIORITIES.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <p className="text-xs text-gray-500">{filteredStories.length} stories found</p>
                <div className="space-y-2">
                  {filteredStories.map(s => (
                    <div key={s.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-gray-600 transition-colors">
                      <div className="flex items-start justify-between gap-3">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap mb-1">
                            <PriBadge p={s.pri} />
                            <span className="text-xs text-gray-500">{s.reg}</span>
                            {s.src && <span className="text-xs text-gray-600">· {s.src}</span>}
                          </div>
                          <h4 className="text-sm font-semibold text-white">{s.hl || s.lead}</h4>
                          <p className="text-xs text-gray-400 mt-1">{s.sig}</p>
                          <div className="flex items-center gap-3 mt-2">
                            <span className="text-xs text-gray-500">📍 {s.loc}</span>
                            <span className="text-xs text-gray-500">🏷️ {s.sec}</span>
                          </div>
                        </div>
                        <button onClick={() => togglePick(s.id)} className={"flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-sm " + (picked.includes(s.id) ? 'bg-amber-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-700')}>
                          {picked.includes(s.id) ? '✓' : '+'}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* VENUES */}
            {tab === 'venues' && (
              <div className="space-y-4">
                <div className="flex flex-col md:flex-row gap-3">
                  <div className="flex-1 relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔍</span>
                    <input value={venQ} onChange={e=>setVenQ(e.target.value)} placeholder="Search venues, towns..." className="w-full pl-10 pr-4 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500" />
                  </div>
                  <select value={regF} onChange={e=>setRegF(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-300 focus:outline-none">
                    {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
                  </select>
                  <select value={catF} onChange={e=>setCatF(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-sm text-gray-300 focus:outline-none">
                    {CATS.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <p className="text-xs text-gray-500">{filteredVenues.length} venues shown</p>
                <div className="grid md:grid-cols-2 gap-3">
                  {filteredVenues.map(v => (
                    <div key={v.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-gray-600 transition-colors">
                      <div className="flex items-start justify-between">
                        <div>
                          <h4 className="text-sm font-semibold text-white">{v.name}</h4>
                          <p className="text-xs text-gray-400 mt-0.5">{v.town}, {v.reg}</p>
                        </div>
                        <span className="text-xs bg-gray-800 border border-gray-700 rounded-full px-2 py-0.5 text-gray-400">{v.cat}</span>
                      </div>
                      <p className="text-xs text-gray-500 mt-2">{v.desc}</p>
                      <div className="flex items-center gap-2 mt-2">
                        <span className="text-xs text-gray-600">{v.sub}</span>
                        {v.hi && <span className="text-xs text-emerald-500">⭐ Sponsor Ready</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ACTIVATIONS */}
            {tab === 'activations' && (
              <div className="space-y-4">
                <div className="relative max-w-md">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔍</span>
                  <input value={actQ} onChange={e=>setActQ(e.target.value)} placeholder="Search activations..." className="w-full pl-10 pr-4 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500" />
                </div>
                <p className="text-xs text-gray-500">{filteredActs.length} activations shown</p>
                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
                  {filteredActs.map(a => (
                    <div key={a.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-amber-800 transition-colors">
                      <div className="flex items-start justify-between mb-2">
                        <span className="text-xs bg-amber-900 text-amber-300 rounded-full px-2 py-0.5">{a.type}</span>
                        <span className="text-xs text-emerald-400 font-medium">{a.val}</span>
                      </div>
                      <h4 className="text-sm font-semibold text-white">{a.name}</h4>
                      <p className="text-xs text-gray-400 mt-1">{a.desc}</p>
                      <div className="flex items-center gap-3 mt-3 text-xs text-gray-500">
                        <span>🕐 {a.freq}</span>
                        <span>🏷️ {a.cat}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* HOOKS */}
            {tab === 'hooks' && (
              <div className="space-y-4">
                <div className="relative max-w-md">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔍</span>
                  <input value={hookQ} onChange={e=>setHookQ(e.target.value)} placeholder="Search hook templates..." className="w-full pl-10 pr-4 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500" />
                </div>
                <p className="text-xs text-gray-500">{filteredHooks.length} hooks shown</p>
                <div className="space-y-3">
                  {filteredHooks.map(h => (
                    <div key={h.id} className="bg-gray-900 border border-gray-800 rounded-xl p-4 hover:border-gray-600 transition-colors">
                      <div className="flex items-start justify-between gap-3">
                        <div className="flex-1">
                          <div className="flex items-center gap-2 mb-2">
                            <span className="text-xs bg-purple-900 text-purple-300 rounded-full px-2 py-0.5">{h.type}</span>
                            <PriBadge p={h.rate} />
                            <span className="text-xs text-gray-600">{h.id}</span>
                          </div>
                          <p className="text-sm font-mono text-amber-300">{h.template}</p>
                          <p className="text-xs text-gray-400 mt-1.5 italic">"{h.ex}"</p>
                        </div>
                        <span className="text-amber-600">💡</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* INOREADER */}
            {tab === 'inoreader' && (
              <div className="space-y-6">
                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-amber-400 mb-4">📡 Add From Inoreader</h3>
                  <p className="text-xs text-gray-400 mb-4">Paste article titles, URLs or snippets from your Inoreader feed. Assign a lifelane and they'll appear as candidate topics.</p>
                  <div className="space-y-3">
                    <textarea value={inoInput} onChange={e=>setInoInput(e.target.value)} placeholder="Paste headline, URL or snippet here..." rows={3} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 resize-none" />
                    <div className="flex flex-col sm:flex-row gap-3">
                      <select value={inoLane} onChange={e=>setInoLane(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none">
                        {['Money & Cost of Living','Homes & Property','Health & Wellbeing','Family & Education','Food & Hospitality','Transport','Business','Community','Pets','Environment','Retail','Local Government'].map(l => (
                          <option key={l} value={l}>{l}</option>
                        ))}
                      </select>
                      <button onClick={addIno} className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-lg text-sm font-medium">+ Add to Queue</button>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-gray-300 mb-4">📄 Feed Queue ({ino.length} items)</h3>
                  {ino.length === 0 ? (
                    <div className="text-center py-8 text-gray-500">
                      <p className="text-2xl mb-2">📡</p>
                      <p className="text-sm">No items in queue yet</p>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {ino.map(item => (
                        <div key={item.id} className="flex items-start gap-3 bg-gray-800 rounded-lg p-3 border border-gray-700">
                          <div className="flex-1 min-w-0">
                            <p className="text-sm text-white">{item.text}</p>
                            <div className="flex items-center gap-2 mt-1">
                              <span className="text-xs bg-blue-900 text-blue-300 rounded-full px-2 py-0.5">{item.lane}</span>
                              <span className="text-xs text-gray-500">Added {item.added}</span>
                            </div>
                          </div>
                          <button onClick={() => removeIno(item.id)} className="w-7 h-7 rounded-lg bg-gray-700 text-gray-400 hover:bg-red-700 hover:text-white flex items-center justify-center text-xs">✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-gray-300 mb-3">🌐 Suggested Inoreader Feeds</h3>
                  <div className="grid md:grid-cols-2 gap-3">
                    {[
                      { name:'BBC Business', desc:'Daily business roundups', tags:['Money','Business'] },
                      { name:'Google News – Peterborough', desc:'Peterborough local news alerts', tags:['Community'] },
                      { name:'Rightmove Blog', desc:'Property market commentary', tags:['Property'] },
                      { name:'This is Money', desc:'Personal finance updates', tags:['Money'] },
                      { name:'Inoreader – EV News', desc:'EV and charging infrastructure', tags:['Transport'] },
                      { name:'Cambridgeshire Live', desc:'County news and community', tags:['Community'] },
                    ].map((f,i) => (
                      <div key={i} className="bg-gray-800 rounded-lg p-3 border border-gray-700">
                        <p className="text-sm font-medium text-white">{f.name}</p>
                        <p className="text-xs text-gray-400 mt-0.5">{f.desc}</p>
                        <div className="flex gap-1 mt-2">
                          {f.tags.map(t => <span key={t} className="text-xs bg-gray-700 text-gray-400 rounded px-1.5 py-0.5">{t}</span>)}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* NICHE HUB */}
            {tab === 'niche' && (
              <div className="space-y-6">
                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-amber-400 mb-4">📰 Niche Newsletter Editions</h3>
                  <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {NN.map((n,i) => (
                      <div key={i} className="bg-gray-800 border border-gray-700 rounded-xl p-4 hover:border-amber-700 transition-colors">
                        <div className="flex items-start justify-between mb-3">
                          <div>
                            <h4 className="text-sm font-bold text-white">{n.brand}</h4>
                            <p className="text-xs text-gray-400">{n.ed} Edition</p>
                          </div>
                          <span className="text-xs bg-emerald-900 text-emerald-300 rounded-full px-2 py-0.5">{n.status}</span>
                        </div>
                        <div className="space-y-1.5">
                          <div className="flex justify-between text-xs"><span className="text-gray-500">Niche</span><span className="text-gray-300">{n.niche}</span></div>
                          <div className="flex justify-between text-xs"><span className="text-gray-500">Sub-niche</span><span className="text-gray-300">{n.sub}</span></div>
                          <div className="flex justify-between text-xs"><span className="text-gray-500">Frequency</span><span className="text-gray-300">{n.freq}</span></div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-gray-300 mb-4">🔗 Cross-Pollination Opportunities</h3>
                  <div className="space-y-3">
                    {[
                      { from:'Pet Insider', to:'Cambridgeshire Spotlight', topic:'Rescue Pet of the Week feeds both newsletters', type:'Content Share' },
                      { from:'Taste Trail', to:'Peterborough Spotlight', topic:'Restaurant reviews in both with different angles', type:'Content Share' },
                      { from:'Home Seller Insider', to:'Smart Property News', topic:'Seller tips repurposed as buyer warnings', type:'Reframe' },
                      { from:'Smart Money News', to:'All Spotlights', topic:'ISA and savings stories localised per region', type:'Localise' },
                    ].map((x,i) => (
                      <div key={i} className="flex items-center gap-3 bg-gray-800 rounded-lg p-3 border border-gray-700 flex-wrap">
                        <span className="text-xs bg-blue-900 text-blue-300 rounded px-2 py-1">{x.from}</span>
                        <span className="text-gray-600">→</span>
                        <span className="text-xs bg-purple-900 text-purple-300 rounded px-2 py-1">{x.to}</span>
                        <span className="text-xs text-gray-400 flex-1 min-w-0">{x.topic}</span>
                        <span className="text-xs text-gray-600">{x.type}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="bg-gray-900 border border-gray-800 rounded-xl p-5">
                  <h3 className="text-sm font-semibold text-gray-300 mb-4">🚀 Expansion Pipeline</h3>
                  <div className="grid md:grid-cols-3 gap-3">
                    {[
                      { brand:'Smart Money News', region:'Peterborough', status:'Planned', color:'text-yellow-400' },
                      { brand:'Taste Trail', region:'Cambridge', status:'Planned', color:'text-yellow-400' },
                      { brand:'Pet Insider', region:'Peterborough', status:'Planned', color:'text-yellow-400' },
                      { brand:'Home Seller Insider', region:'Cambridge', status:'Research', color:'text-blue-400' },
                      { brand:'Smart Property News', region:'Norfolk', status:'Research', color:'text-blue-400' },
                      { brand:'Renter Insider', region:'Cambridgeshire', status:'Concept', color:'text-gray-400' },
                    ].map((e,i) => (
                      <div key={i} className="bg-gray-800 rounded-lg p-3 border border-gray-700">
                        <p className="text-sm font-medium text-white">{e.brand}</p>
                        <p className="text-xs text-gray-400">{e.region} Edition</p>
                        <span className={"text-xs font-medium " + e.color}>{e.status}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SpotlightHQ />);
  </script>
</body>
</html>
